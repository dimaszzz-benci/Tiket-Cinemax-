<!DOCTYPE html>
<html>
<head>
<title>Edit Film</title>
</head>
<body>

<h1>Edit Film</h1>

<form method="POST">

Judul:<br>
<input type="text" name="title" value="{{ movie.title }}"><br>

Genre:<br>
<input type="text" name="genre" value="{{ movie.genre }}"><br>

Harga:<br>
<input type="number" name="price" value="{{ movie.price }}"><br>

Deskripsi:<br>
<textarea name="description">{{ movie.description }}</textarea><br><br>

<button type="submit">Update</button>

</form>

</body>
</html>
