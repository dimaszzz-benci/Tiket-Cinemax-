<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login - CineMax</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;}</style>
</head>
<body>
<div class="card bg-dark text-light border-secondary p-4" style="width:360px">
  <div class="text-center mb-3"><span style="font-size:2rem">🎬</span><h4 class="mt-1">CineMax Admin</h4></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }} py-2">{{ msg }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form method="POST">
    <input type="text" name="user" class="form-control mb-2 bg-dark text-light border-secondary" placeholder="Username" required>
    <input type="password" name="pass" class="form-control mb-3 bg-dark text-light border-secondary" placeholder="Password" required>
    <button class="btn btn-danger w-100">🔐 Masuk</button>
  </form>
</div>
</body>
</html>
