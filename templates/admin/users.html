<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users - CineMax Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#111;color:#eee;}
.sidebar{width:200px;min-height:100vh;background:#1a1a1a;position:fixed;top:0;left:0;padding:20px 0;}
.sidebar .brand{color:#e63946;font-weight:bold;font-size:1.1rem;padding:0 20px 20px;}
.sidebar a{display:block;color:#ccc;padding:10px 20px;text-decoration:none;}
.sidebar a:hover,.sidebar a.active{background:#e63946;color:#fff;}
.main{margin-left:200px;padding:30px;}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">🎬 CINEMAX<br><small class="text-muted" style="font-size:.7rem">ADMIN PANEL</small></div>
  <a href="/admin/">📊 Dashboard</a>
  <a href="/admin/films">🎬 Kelola Film</a>
  <a href="/admin/bookings">🎟️ Booking</a>
  <a href="/admin/users" class="active">👥 Users</a>
  <hr style="border-color:#333">
  <a href="/" style="color:#aaa">← Ke Website</a>
  <a href="/admin/logout" style="color:#e63946">🚪 Keluar Admin</a>
</div>
<div class="main">
  <h2 class="fw-bold mb-4">👥 Daftar Users</h2>
  <div class="bg-dark rounded p-3">
    {% if users %}
    <table class="table table-dark table-striped">
      <thead><tr><th>#</th><th>Username</th><th>Email</th></tr></thead>
      <tbody>
      {% for u in users %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ u.user }}</td>
        <td>{{ u.email }}</td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="text-muted text-center py-5">Belum ada user terdaftar.</p>
    {% endif %}
  </div>
</div>
</body>
</html>
