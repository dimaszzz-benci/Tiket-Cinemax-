{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">🔥 Film Sedang Tayang</h2>
<div class="row g-4">{% for m in movies %}
<div class="col-md-3 col-sm-6">
  <div class="card h-100 bg-dark text-light border-0">
    <img src="{{ m.poster }}" class="card-img-top" style="height:300px;object-fit:cover">
    <div class="card-body">
      <h5 class="card-title">{{ m.title }}</h5>
      <p class="mb-1 text-muted">{{ m.genre }} • {{ m.duration }}</p>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <span class="badge bg-warning text-dark">⭐ {{ m.score }}</span>
        <a href="/booking/{{ m.id }}" class="btn btn-sm btn-danger">Beli Tiket</a>
      </div>
    </div>
  </div>
</div>{% endfor %}</div>
{% endblock %}
